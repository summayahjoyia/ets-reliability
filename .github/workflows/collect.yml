name: Collect ETS Vehicle Positions

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:         # allows manual trigger too

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gtfs-realtime-bindings

      - name: Run collector
        run: python collector/collector.py

      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/collected/vehicle_positions.csv
          git diff --staged --quiet || git commit -m "collect: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push